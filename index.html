<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 관리 프로그램</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#0d1b2a;
  --navy2:#132033;
  --navy3:#1a2d44;
  --panel:#162030;
  --panel2:#1e2d40;
  --panel3:#243851;
  --border:rgba(255,255,255,0.08);
  --teal:#00d4aa;
  --teal2:#00a87e;
  --blue:#4da6ff;
  --blue2:#2280e8;
  --amber:#ffb740;
  --coral:#ff6b6b;
  --purple:#a78bfa;
  --green:#4ade80;
  --pink:#f472b6;
  --text:#e8edf2;
  --text2:#9eb0c4;
  --text3:#5d748d;
  --line:rgba(255,255,255,0.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden}
.topbar{background:linear-gradient(90deg,#0a3d5c,#0d2340);border-bottom:1px solid rgba(0,212,170,.18);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px}
.topbar-logo{font-size:18px;font-weight:900;color:var(--teal)}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-brand-logo{width:30px;height:30px;object-fit:contain;border-radius:50%;background:rgba(255,255,255,.95);padding:2px;box-shadow:0 0 0 1px rgba(255,255,255,.12)}
.topbar-sep{width:1px;height:26px;background:var(--border)}
.topbar-title{font-size:14px;font-weight:800;color:var(--text)}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.topbar-date{font-size:11px;color:var(--text3)}
.file-btn{padding:7px 13px;border-radius:20px;font-size:11px;font-weight:800;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-family:'Noto Sans KR',sans-serif}
.file-btn:hover{border-color:var(--teal);color:var(--teal)}
.file-status{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:999px;padding:5px 10px;font-size:11px;color:var(--text2)}
.file-status .mini-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.file-status.ok .mini-dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.file-status.warn .mini-dot{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.year-nav{background:var(--navy2);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:8px;align-items:center}
.tabs{background:var(--navy2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0;align-items:center}
.yn-label{font-size:11px;color:var(--text3);margin-right:4px}
.year-buttons{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.yr-btn{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all .2s;font-family:'Noto Sans KR',sans-serif}
.tab-btn{border:none;border-radius:0;padding:12px 18px;background:transparent;font-size:12px;font-weight:700;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
.yr-btn:hover,.tab-btn:hover{border-color:var(--teal);color:var(--teal)}
.yr-btn.active{background:var(--teal);border-color:var(--teal);color:var(--navy);box-shadow:0 0 12px rgba(0,212,170,.36)}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}
.content{padding:20px 24px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.load-banner{margin:0 24px 8px;border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--text2);display:none}
.load-banner.ok{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.18)}
.load-banner.warn{background:rgba(255,183,64,.08);border-color:rgba(255,183,64,.18)}
.kpi-row{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:18px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 14px 12px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--teal)}
.kpi.clickable{cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s}
.kpi.clickable:hover{transform:translateY(-2px);border-color:rgba(0,212,170,.35);box-shadow:0 8px 18px rgba(0,0,0,.18)}
.filter-banner{margin-bottom:10px;padding:10px 12px;border:1px solid rgba(0,212,170,.18);border-radius:10px;background:rgba(0,212,170,.08);display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px;color:var(--text2)}
.filter-banner strong{color:var(--teal)}
.filter-clear-btn{padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:11px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.filter-clear-btn:hover{border-color:var(--teal);color:var(--teal)}

.kpi-label{font-size:10px;color:var(--text3);margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:900;line-height:1;color:var(--text)}
.kpi-sub{font-size:10px;color:var(--text2);margin-top:6px;line-height:1.45}
.kpi-target{margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:10px;color:var(--text2)}
.goal-pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:800}
.goal-good{background:rgba(74,222,128,.12);color:var(--green)}
.goal-warn{background:rgba(255,107,107,.12);color:var(--coral)}
.goal-flat{background:rgba(255,255,255,.08);color:var(--text2)}
.grid-row{display:grid;gap:14px;margin-bottom:14px}
.grid-overview-top{grid-template-columns:1.05fr 1.05fr .9fr .9fr}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;overflow:hidden}
.card-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title .dot{width:6px;height:6px;border-radius:50%;background:var(--teal)}
.chart-wrap{position:relative}
.compare-note{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text2);margin-top:10px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center;height:230px}
.donut-center{position:absolute;text-align:center;pointer-events:none}
.donut-center-val{font-size:22px;font-weight:900}
.donut-center-lbl{font-size:10px;color:var(--text3)}

/* ─────── 출신 중학교 탭 ─────── */
.ms-layout{display:grid;grid-template-columns:260px 1fr;gap:14px}
.ms-list-card,.student-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.ms-list-card{max-height:760px;display:flex;flex-direction:column}
.ms-list-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:var(--text2)}
.student-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
.student-hdr-title{font-size:15px;font-weight:900}
.student-hdr-badge{font-size:11px;background:rgba(0,212,170,.15);color:var(--teal);padding:4px 10px;border-radius:999px;font-weight:800}
.ms-search{width:100%;padding:11px 12px;border:none;border-bottom:1px solid var(--border);background:var(--panel2);font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif}
.ms-scroll{overflow-y:auto;flex:1}
.ms-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--line);transition:all .15s}
.ms-item:hover{background:var(--panel2)}
.ms-item.active{background:rgba(0,212,170,.1);border-left:3px solid var(--teal)}
.ms-item-name{font-size:12px}
.ms-item-cnt{font-size:11px;font-weight:800;background:rgba(255,255,255,.07);padding:2px 9px;border-radius:999px;color:var(--text2)}
.student-toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);gap:12px;flex-wrap:wrap}
.student-tag{display:inline-flex;align-items:center;padding:4px 9px;border-radius:999px;background:rgba(255,255,255,.06);font-size:10px}
table.stu-tbl{width:100%;border-collapse:collapse}
table.stu-tbl th,table.stu-tbl td{padding:10px 12px;border-bottom:1px solid var(--line);font-size:11px;text-align:left}
table.stu-tbl th{font-size:10px;letter-spacing:.3px;background:var(--navy2);color:var(--text2);position:sticky;top:0;z-index:1}
table.stu-tbl tr:hover td{background:rgba(255,255,255,.03)}
table.stu-tbl tr.row-active td{background:rgba(0,212,170,.08)}
table.stu-tbl tr.row-active td:first-child{box-shadow:inset 3px 0 0 var(--teal)}
.sortable{cursor:pointer;user-select:none}
.sortable .sort-arrow{opacity:.45;margin-left:4px}
.sortable.active .sort-arrow{opacity:1;color:var(--teal)}
.num{text-align:right}

/* ─────── 학생 조회 탭 ─────── */
.stu-search-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.stu-search-input{flex:1;min-width:200px;padding:9px 14px;border:1px solid var(--border);border-radius:8px;background:var(--panel2);font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif}
.stu-search-input:focus{border-color:var(--teal)}
.stu-filter-select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--panel2);font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif}
.stu-filter-select option{background:var(--navy2)}
.stu-yr-tabs{display:flex;gap:4px;flex-wrap:wrap}
.stu-yr-tab{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all .2s;font-family:'Noto Sans KR',sans-serif}
.stu-yr-tab.active{background:var(--teal);border-color:var(--teal);color:var(--navy)}
.stu-main-layout{display:grid;grid-template-columns:1fr 360px;gap:12px;align-items:start}
.stu-table-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.stu-table-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:var(--text2)}
.stu-table-body{max-height:calc(100vh - 280px);overflow-y:auto}
table.stu-main-tbl{width:100%;border-collapse:collapse}
table.stu-main-tbl th{padding:9px 12px;background:var(--navy2);color:var(--text2);font-size:10px;font-weight:800;letter-spacing:.4px;text-align:left;position:sticky;top:0;z-index:2;border-bottom:1px solid var(--border)}
table.stu-main-tbl td{padding:9px 12px;border-bottom:1px solid var(--line);font-size:12px;color:var(--text);vertical-align:middle}
table.stu-main-tbl tr{cursor:pointer;transition:background .12s}
table.stu-main-tbl tr:hover td{background:var(--panel2)}
table.stu-main-tbl tr.row-active td{background:rgba(0,212,170,.08);border-left:2px solid var(--teal)}
.stu-name-cell{font-weight:700}
.stu-id-cell{font-size:10px;color:var(--text3);font-family:monospace}

/* 학생 상세 패널 - 우측 */
.student-detail{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:sticky;top:16px;max-height:calc(100vh - 200px);overflow-y:auto}
.detail-hdr{padding:16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--panel2),var(--panel3))}
.detail-name{font-size:20px;font-weight:900;margin-bottom:4px}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap}
.detail-badge{padding:3px 10px;border-radius:999px;font-size:10px;font-weight:800}
.badge-male{background:rgba(77,166,255,.15);color:var(--blue)}
.badge-female{background:rgba(244,114,182,.15);color:var(--pink)}
.badge-grad{background:rgba(74,222,128,.15);color:var(--green)}
.badge-active{background:rgba(0,212,170,.15);color:var(--teal)}
.badge-other{background:rgba(255,255,255,.08);color:var(--text2)}
/* 상세 탭 */
.detail-tab-row{display:flex;border-bottom:1px solid var(--border);background:var(--navy2)}
.detail-tab-btn{flex:1;padding:9px 6px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text3);border-bottom:2px solid transparent;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.detail-tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);background:rgba(0,212,170,.04)}
.detail-section{padding:12px 14px;border-bottom:1px solid var(--border)}
.detail-section-title{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.detail-item{background:var(--panel2);border-radius:7px;padding:9px 11px}
.detail-item.full{grid-column:1/-1}
.detail-item .di-label{font-size:10px;color:var(--text3);margin-bottom:2px}
.detail-item .di-val{font-size:12px;font-weight:700;word-break:break-all}
.empty-detail{padding:60px 20px;text-align:center}
.empty-detail .em{font-size:36px;opacity:.3;margin-bottom:10px}
.empty-detail .et{font-size:14px;font-weight:700;color:var(--text2)}
.empty-detail .es{font-size:12px;color:var(--text3);margin-top:6px}
.no-results{padding:40px 24px;text-align:center;font-size:12px;color:var(--text3)}

/* ─────── 졸업생 사후관리 탭 ─────── */
.grad-layout{display:grid;grid-template-columns:1fr 360px;gap:14px;align-items:start}
.grad-filter-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.grad-filter-btn{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all .2s;font-family:'Noto Sans KR',sans-serif}
.grad-filter-btn.active{background:var(--teal);border-color:var(--teal);color:var(--navy)}
.grad-search{padding:8px 14px;border:1px solid var(--border);border-radius:20px;background:var(--panel2);font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;width:180px}
.grad-yr-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.grad-yr-tab{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all .2s;font-family:'Noto Sans KR',sans-serif}
.grad-yr-tab.active{background:var(--amber);border-color:var(--amber);color:var(--navy)}
.grad-table-wrap{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.grad-table-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:var(--text2)}
.grad-table-scroll{max-height:560px;overflow:auto}
.grad-detail-panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:sticky;top:16px}
.grad-stat-mini{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.stat-box{background:var(--panel2);border-radius:8px;padding:10px 12px}
.stat-box .sb-label{font-size:10px;color:var(--text3);margin-bottom:3px}
.stat-box .sb-val{font-size:18px;font-weight:900}
.status-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700}
.chip-employ{background:rgba(0,212,170,.12);color:var(--teal)}
.chip-college{background:rgba(167,139,250,.12);color:var(--purple)}
.chip-undecided{background:rgba(255,107,107,.12);color:var(--coral)}
.chip-dropout{background:rgba(255,183,64,.12);color:var(--amber)}
/* 사후관리 편집 입력창 */
.aftercare-section{padding:14px}
.aftercare-title{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.6px;margin-bottom:10px}
.aftercare-field{margin-bottom:10px}
.aftercare-field label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px}
.aftercare-field textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--panel2);font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;resize:vertical;min-height:60px;transition:border-color .2s}
.aftercare-field textarea:focus{border-color:var(--teal)}
.aftercare-save-btn{width:100%;padding:10px;border-radius:8px;background:var(--teal);color:var(--navy);font-size:12px;font-weight:900;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .2s;margin-top:4px}
.aftercare-save-btn:hover{opacity:.85}
.aftercare-save-btn:disabled{opacity:.4;cursor:not-allowed}
.save-toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#0d1b2a;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:800;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.save-toast.show{opacity:1}

/* ─────── 산출식 탭 ─────── */
.metrics-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:14px;margin-bottom:14px}
.metrics-table-wrap{overflow:auto}
.metrics-table{width:100%;border-collapse:collapse}
.metrics-table th,.metrics-table td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:11px;text-align:left;vertical-align:top}
.metrics-table th{background:var(--navy2);color:var(--text2);font-size:10px;letter-spacing:.3px}
.metrics-table tr:hover td{background:rgba(255,255,255,.03)}
.metrics-chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:800}
.metrics-chip.req{background:rgba(77,166,255,.12);color:var(--blue)}
.metrics-chip.opt{background:rgba(255,183,64,.12);color:var(--amber)}
.metrics-note{font-size:11px;color:var(--text2);line-height:1.7}
.metrics-year{background:rgba(0,212,170,.08)}

.empty-card,.no-data-panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:56px 24px;text-align:center}
.empty-card .emoji,.no-data-panel .emoji{font-size:42px;opacity:.35;margin-bottom:10px}
.empty-card .title,.no-data-panel .title{font-size:17px;font-weight:900;margin-bottom:8px}
.empty-card .sub,.no-data-panel .sub{font-size:12px;color:var(--text3);line-height:1.6;max-width:640px;margin:0 auto 14px}
.summary-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.summary-box{background:var(--panel2);border-radius:12px;padding:12px}
.summary-box .label{font-size:10px;color:var(--text3);margin-bottom:4px}
.summary-box .value{font-size:20px;font-weight:900;color:var(--text)}
.summary-box .sub{font-size:10px;color:var(--text2);margin-top:4px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}

/* ─────── 로그인 화면 ─────── */
#login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#091627,#0d2340);display:flex;align-items:center;justify-content:center;z-index:9999}
#login-overlay.hidden{display:none}
.login-box{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.45)}
.login-logo-row{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.login-logo-img{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.95);padding:3px;object-fit:contain}
.login-title{font-size:20px;font-weight:900;color:var(--teal)}
.login-subtitle{font-size:12px;color:var(--text3);margin-top:2px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px}
.login-field input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:var(--panel2);font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;transition:border-color .2s}
.login-field input:focus{border-color:var(--teal)}
.login-btn{width:100%;padding:13px;border-radius:10px;background:var(--teal);color:var(--navy);font-size:14px;font-weight:900;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:6px;transition:opacity .2s}
.login-btn:hover{opacity:.88}
.login-btn:disabled{opacity:.45;cursor:not-allowed}
.login-error{font-size:12px;color:var(--coral);margin-top:8px;text-align:center;min-height:18px}

/* ─────── 사용자 관리 탭 ─────── */
.user-mgmt-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.user-add-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px}
.user-add-card h3{font-size:13px;font-weight:800;color:var(--text2);margin-bottom:14px}
.user-field{margin-bottom:12px}
.user-field label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px}
.user-field input,.user-field select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--panel2);font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;transition:border-color .2s}
.user-field input:focus,.user-field select:focus{border-color:var(--teal)}
.user-field select option{background:var(--navy2)}
.user-add-btn{padding:10px 20px;border-radius:8px;background:var(--teal);color:var(--navy);font-size:12px;font-weight:900;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .2s}
.user-add-btn:hover{opacity:.85}
.user-add-btn:disabled{opacity:.4;cursor:not-allowed}
.user-add-msg{font-size:12px;margin-top:10px;min-height:16px}
.user-add-msg.ok{color:var(--green)}
.user-add-msg.err{color:var(--coral)}
.user-list-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.user-list-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:var(--text2)}
.user-list-scroll{max-height:460px;overflow-y:auto}
table.user-tbl{width:100%;border-collapse:collapse}
table.user-tbl th{padding:9px 12px;background:var(--navy2);color:var(--text2);font-size:10px;font-weight:800;letter-spacing:.4px;text-align:left;position:sticky;top:0;z-index:1}
table.user-tbl td{padding:9px 12px;border-bottom:1px solid var(--line);font-size:12px}
table.user-tbl tr:hover td{background:var(--panel2)}
.role-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:800}
.role-admin{background:rgba(255,183,64,.12);color:var(--amber)}
.role-viewer{background:rgba(255,255,255,.08);color:var(--text2)}
.user-del-btn{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,107,107,.3);background:rgba(255,107,107,.08);color:var(--coral);font-size:10px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.user-del-btn:hover{background:rgba(255,107,107,.2);border-color:var(--coral)}

@media(max-width:1280px){
  .user-mgmt-layout{grid-template-columns:1fr}
}

@media(max-width:1280px){
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .grid-overview-top,.grid-2,.grid-3,.ms-layout,.search-layout,.grad-layout,.metrics-grid{grid-template-columns:1fr}
}
@media(max-width:760px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .content{padding:16px}
  .topbar,.year-nav,.tabs{padding-left:16px;padding-right:16px}
  .load-banner{margin-left:16px;margin-right:16px}
}
</style>

<script>
/* ════════════════════════════════════════════
   ★ Google Apps Script 웹앱 URL 설정 ★
   배포 후 얻은 URL을 아래에 붙여넣으세요.
   예: https://script.google.com/macros/s/AKfy.../exec
════════════════════════════════════════════ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxbJ_f_W25zXLKC4eO8gOnZbWxlxEfRYwZKj3dYAFvgLaph6x3dvot1VmtV8m8TL_42fw/exec';

document.getElementById('live-date').textContent = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});

/* ────────────────────────────────────────────
   로그인 / 세션
──────────────────────────────────────────── */
let currentUser = null; // { name, role, token }

/* ────────────────────────────────────────────
   GAS 통신 헬퍼
   - GAS 웹앱은 POST도 302 리다이렉트를 할 수 있어
     redirect:'follow' 를 명시합니다.
   - Content-Type 헤더를 보내면 브라우저가 프리플라이트를
     먼저 보내 CORS 오류가 나므로 헤더를 제거하고
     body를 URLSearchParams 대신 plain text로 보냅니다.
──────────────────────────────────────────── */
async function gasPost(body) {
  const res = await fetch(GAS_URL, {
    method : 'POST',
    redirect: 'follow',
    body   : JSON.stringify(body)   // Content-Type 헤더 없음 → simple request → CORS 통과
  });
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e) { return { error: '응답 파싱 오류: ' + text.slice(0, 120) }; }
}
// GET도 POST로 통일 (리다이렉트 파라미터 유실 방지)
async function gasGet(params) {
  return gasPost(params);
}

function showLogin() {
  document.getElementById('login-overlay').classList.remove('hidden');
}
function hideLogin() {
  document.getElementById('login-overlay').classList.add('hidden');
}
function applySession(user) {
  currentUser = user;
  sessionStorage.setItem('gasUser', JSON.stringify(user));
  document.getElementById('topbar-user').textContent = `👤 ${user.name} (${user.role === 'admin' ? '관리자' : '조회자'})`;
  document.getElementById('topbar-user').style.display = '';
  document.getElementById('logout-btn').style.display = '';
  if (user.role === 'admin') {
    document.getElementById('tab-btn-users').style.display = '';
  }
  hideLogin();
  // ★ 로그인 직후 구글 시트 데이터 자동 로드
  loadDataFromGAS();
}
function doLogout() {
  currentUser = null;
  sessionStorage.removeItem('gasUser');
  document.getElementById('topbar-user').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('tab-btn-users').style.display = 'none';
  // DB 초기화
  DB=[]; YEARS=[]; metricsMap={}; summaryCache={};
  originalSheetRows=[]; originalHeaders=[];
  renderAll();
  showLogin();
}

/* ────────────────────────────────────────────
   구글 시트 → DB 자동 로드
──────────────────────────────────────────── */
async function loadDataFromGAS() {
  setFileStatus('구글 시트 연결 중...','warn');
  setLoadBanner('구글 스프레드시트에서 데이터를 불러오는 중입니다...','warn',true);
  try {
    const data = await gasGet({ action: 'data', token: currentUser?.token || '' });
    if (!data.ok) {
      setFileStatus('데이터 로드 실패','warn');
      setLoadBanner(`<strong>오류:</strong> ${escapeHtml(data.error || '알 수 없는 오류')}`, 'warn', true);
      renderAll();
      return;
    }
    // ── 학생DB 변환 (엑셀 rawRows 형식과 동일하게) ──
    const rawRows = data.students || [];
    originalHeaders = rawRows.length > 0 ? Object.keys(rawRows[0]).map(h => String(h).trim()) : [];
    originalSheetRows = rawRows.map(r => ({...r}));
    DB = rawRows.map((r, i) => normalizeRow(r, i)).filter(r => r.이름 && r.입학년도);
    YEARS = [...new Set(DB.map(r => r.입학년도).filter(Boolean))].sort((a,b) => a-b);

    // ── 산출식/목표치 변환 ──
    metricsMap = parseMetricsFromGAS(data.metrics || []);
    summaryCache = {};
    selStudentIdx = null; selGradIdx = null; gradSearch = ''; gradYear = '전체';

    setFileStatus(DB.length ? `구글 시트 연결 완료 · ${DB.length}명` : '데이터 없음', DB.length ? 'ok' : 'warn');
    setLoadBanner(`<strong>구글 스프레드시트</strong> 연동 완료 · 학생 <strong>${fmtNum(DB.length)}명</strong> · 학년도 ${YEARS.join(', ')}`, 'ok', true);

    // 구글 시트 모드에서는 엑셀 관련 버튼 숨김, 새로고침 버튼 표시
    document.getElementById('export-btn').style.display = 'none';
    document.getElementById('save-direct-btn').style.display = 'none';
    document.getElementById('open-rw-btn').style.display = 'none';
    document.getElementById('pick-file-btn').style.display = 'none';
    document.getElementById('gas-refresh-btn').style.display = '';

    renderAll();
  } catch(e) {
    setFileStatus('연결 오류','warn');
    setLoadBanner('<strong>구글 시트 연결 오류</strong> — GAS_URL을 확인하거나 잠시 후 다시 시도해주세요.','warn',true);
    renderAll();
  }
}

/* ────────────────────────────────────────────
   GAS 메트릭 데이터 파싱
   (산출식목표 시트: 헤더 행 기반 JSON 배열)
──────────────────────────────────────────── */
function parseMetricsFromGAS(rows) {
  // 시트 헤더 예시: 지표명 | 연도 | 실적 | 목표
  const result = {};
  rows.forEach(r => {
    const metric = String(r['지표명'] || r['항목'] || r['metric'] || '').trim();
    const year   = parseInt(r['연도'] || r['year'] || 0);
    const actual = r['실적'] !== undefined ? r['실적'] : (r['actual'] !== undefined ? r['actual'] : null);
    const target = r['목표'] !== undefined ? r['목표'] : (r['target'] !== undefined ? r['target'] : null);
    if (!metric || !year) return;
    const key = normalizeMetricName(metric);
    if (!result[key]) result[key] = {};
    result[key][year] = {
      actual: (actual === null || actual === undefined || actual === '') ? null : toNumber(actual),
      target: (target === null || target === undefined || target === '') ? null : toNumber(target)
    };
  });
  return result;
}

/* ────────────────────────────────────────────
   GAS로 사후관리 저장
──────────────────────────────────────────── */
async function saveAftercarToGAS(r, v1, v2, vn) {
  const updates = [
    { rowKey: '이름', rowValue: r.이름, colName: '졸업1년사후관리', value: v1 },
    { rowKey: '이름', rowValue: r.이름, colName: '졸업2년사후관리', value: v2 },
    { rowKey: '이름', rowValue: r.이름, colName: '비고',            value: vn }
  ];
  try {
    const data = await gasPost({ action: 'save', token: currentUser?.token || '', updates });
    if (data.ok) {
      showToast(`✅ 구글 시트에 저장 완료 (${data.saved}건)`);
    } else {
      showToast('⚠️ 저장 실패: ' + (data.error || '알 수 없는 오류'));
    }
  } catch(e) {
    showToast('⚠️ 서버 연결 오류로 저장하지 못했습니다.');
  }
}

document.getElementById('logout-btn').addEventListener('click', doLogout);

// 로그인 버튼 처리
document.getElementById('login-btn').addEventListener('click', async () => {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value.trim();
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!id || !pw) { errEl.textContent = '아이디와 비밀번호를 입력해주세요.'; return; }
  btn.disabled = true; btn.textContent = '로그인 중...'; errEl.textContent = '';
  try {
    const data = await gasGet({ action: 'login', id, password: pw });
    if (data.ok) {
      applySession({ name: data.name, role: data.role, token: data.token });
    } else {
      errEl.textContent = data.error || '로그인에 실패했습니다.';
    }
  } catch(e) {
    errEl.textContent = '서버 연결에 실패했습니다. GAS_URL을 확인해주세요.';
  }
  btn.disabled = false; btn.textContent = '로그인';
});
// Enter 키 지원
['login-id','login-pw'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
});

// 세션 복원 (새로고침 대비) — applySession이 loadDataFromGAS를 호출하므로 그대로 사용
(function restoreSession() {
  try {
    const saved = sessionStorage.getItem('gasUser');
    if (saved) { applySession(JSON.parse(saved)); return; }
  } catch(_) {}
  showLogin();
})();

/* ────────────────────────────────────────────
   사용자 관리 탭 렌더링
──────────────────────────────────────────── */
let userList = []; // 캐시

async function fetchUserList() {
  try {
    const data = await gasGet({ action: 'listUsers', token: currentUser?.token || '' });
    if (data.ok) { userList = data.users || []; }
  } catch(_) { userList = []; }
}

async function renderUsers() {
  const el = document.getElementById('tab-users');
  el.innerHTML = `<div style="padding:20px;color:var(--text3);font-size:12px">사용자 목록을 불러오는 중...</div>`;
  await fetchUserList();
  el.innerHTML = `
    <div class="user-mgmt-layout">
      <div class="user-add-card">
        <h3>➕ 사용자 추가</h3>
        <div class="user-field"><label>아이디</label><input type="text" id="nu-id" placeholder="사용할 아이디"></div>
        <div class="user-field"><label>비밀번호</label><input type="password" id="nu-pw" placeholder="비밀번호"></div>
        <div class="user-field">
          <label>권한</label>
          <select id="nu-role">
            <option value="viewer">조회자 (viewer)</option>
            <option value="admin">관리자 (admin)</option>
          </select>
        </div>
        <button class="user-add-btn" id="nu-submit-btn">사용자 추가</button>
        <div class="user-add-msg" id="nu-msg"></div>
        <div style="margin-top:20px;padding:14px;background:var(--panel2);border-radius:10px;font-size:11px;color:var(--text2);line-height:1.7">
          <strong style="color:var(--text)">권한 설명</strong><br>
          · <span style="color:var(--amber)">관리자</span>: 로그인, 모든 탭 조회, 사후관리 저장, 사용자 관리<br>
          · <span style="color:var(--text2)">조회자</span>: 로그인 후 모든 탭 조회 가능 (사용자 관리 탭 없음)
        </div>
      </div>
      <div class="user-list-card">
        <div class="user-list-hdr">
          <span>등록된 사용자 목록</span>
          <span style="font-weight:500;color:var(--text3)">${userList.length}명</span>
        </div>
        <div class="user-list-scroll">
          <table class="user-tbl">
            <thead><tr><th>아이디</th><th>권한</th><th>삭제</th></tr></thead>
            <tbody>
              ${userList.length === 0
                ? `<tr><td colspan="3" style="text-align:center;color:var(--text3);padding:30px">등록된 사용자가 없습니다.</td></tr>`
                : userList.map((u,i) => `
                  <tr>
                    <td style="font-weight:700">${escapeHtml(u.id)}</td>
                    <td><span class="role-chip ${u.role==='admin'?'role-admin':'role-viewer'}">${u.role==='admin'?'관리자':'조회자'}</span></td>

const valueLabelPlugin={
  id:'valueLabelPlugin',
  afterDatasetsDraw(chart,args,opts){
    const type=chart.config.type;
    if(type!=='bar') return;
    const {ctx}=chart;
    const indexAxis=chart.options.indexAxis||'x';
    const suffix=opts&&opts.suffix?opts.suffix:'명';
    const formatter=opts&&opts.formatter?opts.formatter:(v=>`${v}${suffix}`);
    ctx.save();
    ctx.font='700 11px "Noto Sans KR", sans-serif';
    ctx.fillStyle=opts&&opts.color?opts.color:'#e8edf2';
    ctx.textBaseline='middle';
    chart.data.datasets.forEach((dataset,di)=>{
      const meta=chart.getDatasetMeta(di);
      if(meta.hidden) return;
      meta.data.forEach((bar,i)=>{
        const raw=dataset.data[i];
        if(raw===null||raw===undefined||raw==='') return;
        const text=formatter(raw,i,dataset.label);
        if(indexAxis==='y'){
          ctx.textAlign='left';
          const tx=Math.min(bar.x+8, chart.chartArea.right-26);
          ctx.fillText(text, tx, bar.y);
        }
        else{
          ctx.textAlign='center';
          const ty=Math.max(bar.y-10, chart.chartArea.top+10);
          ctx.fillText(text, bar.x, ty);
        }
      });
    });
    ctx.restore();
  }
};

function bindImeSafeInput(inputEl, onCommit){

  let isComposing=false;
  inputEl.addEventListener('compositionstart',()=>{isComposing=true;});
  inputEl.addEventListener('compositionend',()=>{isComposing=false;});
  inputEl.addEventListener('keydown',e=>{
    if(e.key==='Enter' && !isComposing){
      onCommit(e.target.value);
    }
  });
  inputEl.addEventListener('change',e=>{
    if(!isComposing) onCommit(e.target.value);
  });
  inputEl.addEventListener('blur',e=>{
    if(!isComposing) onCommit(e.target.value);
  });
}

function deptSort(a,b){
  const ai=DEPT_FIXED_ORDER.indexOf(a),bi=DEPT_FIXED_ORDER.indexOf(b);
  if(ai!==-1||bi!==-1){
    if(ai===-1) return 1;
    if(bi===-1) return -1;
    if(ai!==bi) return ai-bi;
  }
  const ga=DEPT_GROUP_ORDER.indexOf(deptGroup(a));
  const gb=DEPT_GROUP_ORDER.indexOf(deptGroup(b));
  if(ga!==gb) return (ga===-1?99:ga)-(gb===-1?99:gb);
  return String(a).localeCompare(String(b),'ko');
}
function targetCompare(actual,target,higherIsBetter=true){
  if(target===null||target===undefined||actual===null||actual===undefined) return {label:'목표 없음',cls:'goal-flat'};
  const diff=actual-target;
  if(Math.abs(diff)<0.05) return {label:'목표와 동일',cls:'goal-flat'};
  const ok=higherIsBetter?diff>=0:diff<=0;
  return {label:`${ok?'목표 달성':'목표 미달'} ${Math.abs(diff).toFixed(1)}%`,cls:ok?'goal-good':'goal-warn'};
}
function normalizeMetricName(name){return String(name||'').replace(/\s+/g,'').trim();}
function metricAliases(metric){
  const key=normalizeMetricName(metric);
  const aliases={
    '미결정률':['진로미결정률'],'진로미결정률':['미결정률'],
    '거버넌스참여자및핵심관계자수치':['지역거버넌스참여자및핵심관계자만족도'],

    '지역정주율':['지역내정주율'],'지역내정주율':['지역정주율'],
    '지역내취업률':['대전내취업률'],'대전내취업률':['지역내취업률'],
    '중도탈락자':['중도탈락률'],'신입생충원율':['충원율']
  };
  return [key,...(aliases[key]||[])];
}
function computedMetricActual(metric,year){
  const s=getSummary(year);
  const key=normalizeMetricName(metric);
  if(!s||!s.total) return null;
  if(['중도탈락률','중도탈락자'].includes(key)) return s.dropoutRate;
  if(['지역정주율','지역내정주율'].includes(key)) return s.localStayRate;
  if(['진로미결정률','미결정률'].includes(key)) return s.undecidedRate;
  if(['순취업률'].includes(key)) return s.employRate;
  if(['지역내취업률','대전내취업률'].includes(key)) return s.localEmployRate;
  if(['충원율','신입생충원율'].includes(key)) return s.recruitRate;
  return null;
}
function metricValue(metric,year,mode='actual'){
  const candidates=metricAliases(metric);
  for(const key of candidates){
    if(metricsMap[key]?.[year]?.[mode]!==undefined&&metricsMap[key]?.[year]?.[mode]!==null) return metricsMap[key][year][mode];
  }
  if(mode==='actual'){
    for(const key of candidates){
      const calc=computedMetricActual(key,year);
      if(calc!==null&&calc!==undefined) return calc;
    }
  }
  return null;
}

function parseMetrics(sheet){
  const result={};
  function readCell(addr){const cell=sheet[addr];return cell?cell.v:null;}
  function addMetric(metric,year,actual,target){
    if(!metric||!year) return;
    const key=normalizeMetricName(metric);
    if(!result[key]) result[key]={};
    result[key][year]={actual:(actual===null||actual===undefined||actual==='')?null:toNumber(actual),target:(target===null||target===undefined||target==='')?null:toNumber(target)};
  }
  function readBlock(headerMetricCell,startRow,endRow,yearCol,actualCol,targetCol){
    const metric=String(readCell(headerMetricCell)||'').trim();
    if(!metric) return;
    for(let r=startRow;r<=endRow;r++){
      const y=toInt(readCell(yearCol+r));
      if(!y) continue;
      addMetric(metric,y,readCell(actualCol+r),readCell(targetCol+r));
    }
  }
  readBlock('C2',3,11,'B','C','D');
  readBlock('G2',3,11,'F','G','H');
  readBlock('C13',14,22,'B','C','D');
  readBlock('G13',14,22,'F','G','H');
  readBlock('C24',25,33,'B','C','D');
  readBlock('G24',25,33,'F','G','H');
  readBlock('C35',36,44,'B','C','D');
  readBlock('G35',36,44,'F','G','H');
  return result;
}
function getRowsByYear(year){return DB.filter(r=>r.입학년도===year);}
function getSummary(year){
  if(summaryCache[year]) return summaryCache[year];
  const rows=getRowsByYear(year);
  const grads=rows.filter(r=>r.상태==='졸업');
  const total=rows.length;
  const m=rows.filter(r=>r.성별==='남').length;
  const f=rows.filter(r=>r.성별==='여').length;
  const dropout=rows.filter(r=>r.상태==='중도탈락').length;
  const graduated=grads.length;
  const employed=grads.filter(r=>r.진로유형==='취업').length;
  const localEmploy=grads.filter(r=>r.진로유형==='취업'&&r.지역==='대전').length;
  const outerEmploy=employed-localEmploy;
  const college4=grads.filter(r=>r.진로유형==='4년제').length;
  const college2=grads.filter(r=>r.진로유형==='전문대').length;
  const college=college4+college2;
  const localCollege=grads.filter(r=>['4년제','전문대'].includes(r.진로유형)&&r.지역==='대전').length;
  const outerCollege=college-localCollege;
  const undecided=grads.filter(r=>r.진로유형==='미결정').length;
  const localStay=localEmploy+localCollege;
  const recruitRate=total?total/QUOTA*100:0;
  const dropoutRate=total?dropout/total*100:0;
  const undecidedRate=graduated?undecided/graduated*100:0;
  const localStayRate=graduated?localStay/graduated*100:0;
  const ms={};
  rows.forEach(r=>{ms[r.출신중학교]=(ms[r.출신중학교]||0)+1;});
  const deptMap={};
  rows.forEach(r=>{
    const key=r.입학학과||'미지정';
    if(!deptMap[key]) deptMap[key]={male:0,female:0,total:0,employed:0,college:0,undecided:0,graduated:0};
    deptMap[key].total++;
    if(r.성별==='남') deptMap[key].male++;
    if(r.성별==='여') deptMap[key].female++;
    if(r.상태==='졸업'){
      deptMap[key].graduated++;
      if(r.진로유형==='취업') deptMap[key].employed++;
      else if(['4년제','전문대'].includes(r.진로유형)) deptMap[key].college++;
      else if(r.진로유형==='미결정') deptMap[key].undecided++;
    }
  });
  const deptLabels=Object.keys(deptMap).sort(deptSort);
  const deptMale=deptLabels.map(k=>deptMap[k].male);
  const deptFemale=deptLabels.map(k=>deptMap[k].female);
  const deptEmployRate=deptLabels.map(k=>deptMap[k].graduated?+(deptMap[k].employed/deptMap[k].graduated*100).toFixed(1):null);
  const deptCollegeRate=deptLabels.map(k=>deptMap[k].graduated?+(deptMap[k].college/deptMap[k].graduated*100).toFixed(1):null);
  const deptUndecidedRate=deptLabels.map(k=>deptMap[k].graduated?+(deptMap[k].undecided/deptMap[k].graduated*100).toFixed(1):null);
  const summary={year,rows,total,m,f,dropout,graduated,employed,localEmploy,outerEmploy,college,college4,college2,localCollege,outerCollege,undecided,localStay,recruitRate,dropoutRate,undecidedRate,localStayRate,employRate:graduated?employed/graduated*100:0,localEmployRate:employed?localEmploy/employed*100:0,collegeRate:graduated?college/graduated*100:0,localCollegeRate:college?localCollege/college*100:0,ms,deptLabels,deptMale,deptFemale,deptEmployRate,deptCollegeRate,deptUndecidedRate,deptMap};
  summaryCache[year]=summary;
  return summary;
}

function kpiTargetHtml(actual,target,higherIsBetter){
  if(target===null||target===undefined) return `<div class="kpi-target"><span>목표치</span><span class="goal-pill goal-flat">없음</span></div>`;
  const cmp=targetCompare(actual,target,higherIsBetter);
  return `<div class="kpi-target"><span>목표 ${target.toFixed(1)}%</span><span class="goal-pill ${cmp.cls}">${cmp.label}</span></div>`;
}
function semiGaugeConfig(actual,target,color){
  const val=Math.max(0,Math.min(100,Number(actual||0)));
  const needleVal=target===null||target===undefined?null:Math.max(0,Math.min(100,Number(target||0)));
  return {
    type:'doughnut',
    data:{datasets:[{data:[val,100-val],backgroundColor:[color,'rgba(255,255,255,.08)'],borderWidth:0,circumference:180,rotation:270,cutout:'72%'}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:8,bottom:26,left:8,right:8}},plugins:{legend:{display:false},tooltip:{enabled:false}}},
    plugins:[{
      id:'centerText',
      afterDraw(chart){
        const {ctx,chartArea:{left,right,bottom}}=chart;
        const meta=chart.getDatasetMeta(0);
        const arc=meta&&meta.data&&meta.data[0];
        const x=(left+right)/2;
        const y=bottom-28;
        ctx.save();
        if(arc&&needleVal!==null){
          const cx=arc.x,cy=arc.y;
          const outer=arc.outerRadius;
          const inner=arc.innerRadius;
          const angle=(-Math.PI)+(needleVal/100)*Math.PI;
          const startR=inner-2,endR=outer+8;
          const sx=cx+Math.cos(angle)*startR,sy=cy+Math.sin(angle)*startR;
          const ex=cx+Math.cos(angle)*endR,ey=cy+Math.sin(angle)*endR;
          // 목표치 침 — 빨간색 + 글로우로 가시성 강화
          ctx.shadowColor='#ff4444';ctx.shadowBlur=8;
          ctx.strokeStyle='#ff3333';ctx.lineWidth=4;ctx.lineCap='round';
          ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
          // 침 끝 원형 마커
          ctx.shadowBlur=0;ctx.fillStyle='#ff3333';
          ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);ctx.fill();
          ctx.shadowBlur=0;
        }
        ctx.shadowColor='transparent';ctx.shadowBlur=0;
        ctx.textAlign='center';
        ctx.fillStyle='#e8edf2';ctx.font='900 22px "Noto Sans KR", sans-serif';
        ctx.fillText(pct(actual||0),x,y-4);
        ctx.fillStyle='#9eb0c4';ctx.font='700 11px "Noto Sans KR", sans-serif';
        ctx.fillText(target!==null&&target!==undefined?`목표 ${pct(target)}`:'목표 없음',x,y+18);
        ctx.restore();
      }
    }]
  };
}

/* ────────────────────────────────────────────
   출신 중학교 탭
──────────────────────────────────────────── */
function sortStudents(rows){
  const key=middleSort.key,dir=middleSort.dir==='asc'?1:-1;
  return rows.slice().sort((a,b)=>{
    const av=a[key],bv=b[key];
    const an=typeof av==='number'?av:toNumber(av),bn=typeof bv==='number'?bv:toNumber(bv);
    if(an!==null&&bn!==null){if(an!==bn) return (an-bn)*dir;return String(a.이름||'').localeCompare(String(b.이름||''),'ko');}
    return String(av??'').localeCompare(String(bv??''),'ko')*dir;
  });
}
function renderStudentTable(rows){
  const headers=[['이름','이름',false],['성별','성별',false],['중학교내신','중학교내신',true],['입학학과','입학학과',false],['상태','상태',false],['진로유형','진로유형',false],['대학회사명','대학회사명',false]];
  const headerHtml=headers.map(([label,key,isNum])=>{
    const active=middleSort.key===key;
    const arrow=active?(middleSort.dir==='asc'?'▲':'▼'):'↕';
    return `<th class="sortable ${active?'active':''} ${isNum?'num':''}" data-key="${key}">${label}<span class="sort-arrow">${arrow}</span></th>`;
  }).join('');
  const body=rows.map(r=>`<tr class="${selMS===r.출신중학교?'':''}">
    <td>${escapeHtml(r.이름)}</td><td>${escapeHtml(r.성별||'-')}</td>
    <td class="num">${r.중학교내신!==null?fmtNum(r.중학교내신,1):'-'}</td>
    <td>${escapeHtml(r.입학학과||'-')}</td><td>${escapeHtml(r.상태||'-')}</td>
    <td>${escapeHtml(r.진로유형||'-')}</td><td>${escapeHtml(r.대학회사명||'-')}</td>
  </tr>`).join('');
  return `<div style="max-height:480px;overflow:auto"><table class="stu-tbl"><thead><tr>${headerHtml}</tr></thead><tbody>${body||`<tr><td colspan="7" style="text-align:center;color:var(--text3)">데이터가 없습니다.</td></tr>`}</tbody></table></div>`;
}
function renderMiddle(){
  const d=getSummary(CY);
  const sortedMS=Object.entries(d.ms).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0],'ko'));
  const filteredMS=msQ?sortedMS.filter(([name])=>name.includes(msQ)):sortedMS;
  if(!selMS&&filteredMS.length) selMS=filteredMS[0][0];
  if(selMS&&!sortedMS.find(v=>v[0]===selMS)) selMS=filteredMS[0]?.[0]||null;
  const studentRows=sortStudents(getRowsByYear(CY).filter(r=>r.출신중학교===selMS));
  const el=document.getElementById('tab-middle');
  el.innerHTML=`
    <div class="ms-layout">
      <div class="ms-list-card">
        <div class="ms-list-hdr"><span>중학교 목록</span><span style="font-weight:500;color:var(--text3)">${sortedMS.length}개교 · ${fmtNum(d.total)}명</span></div>
        <input class="ms-search" placeholder="중학교 검색... (입력 후 Enter)" value="${escapeHtml(msQ)}">
        <div class="ms-scroll">
          ${filteredMS.map(([name,cnt])=>`<div class="ms-item ${selMS===name?'active':''}" data-ms="${escapeHtml(name)}"><span class="ms-item-name">${escapeHtml(name)}</span><span class="ms-item-cnt">${fmtNum(cnt)}명</span></div>`).join('')}
        </div>
      </div>
      <div>
        <div class="card" style="margin-bottom:14px">
          <div class="card-title"><span class="dot"></span>${CY}학년도 출신 중학교 상위 15개교</div>
          <div class="chart-wrap" style="height:240px"><canvas id="c-ms-bar"></canvas></div>
        </div>
        <div class="student-card">
          <div class="student-hdr">
            <div class="student-hdr-title">${escapeHtml(selMS||'중학교를 선택하세요')}</div>
            ${selMS?`<span class="student-hdr-badge">${fmtNum(d.ms[selMS]||0)}명</span>`:''}
          </div>
          <div class="student-toolbar">
            <div><span class="student-tag">열 제목 클릭 시 정렬</span></div>
            <div style="font-size:11px;color:var(--text3)">정렬: ${escapeHtml(middleSort.key)} / ${middleSort.dir==='asc'?'오름차순':'내림차순'}</div>
          </div>
          ${selMS?renderStudentTable(studentRows):`<div class="empty-card" style="border:none;border-radius:0"><div class="sub">좌측에서 중학교를 선택하세요.</div></div>`}
        </div>
      </div>
    </div>
  `;
  bindImeSafeInput(el.querySelector('.ms-search'), value=>{msQ=value.trim();renderMiddle();});
  el.querySelectorAll('.ms-item').forEach(item=>item.addEventListener('click',()=>{selMS=item.dataset.ms;renderMiddle();}));
  el.querySelectorAll('.sortable').forEach(th=>{
    th.addEventListener('click',()=>{
      const key=th.dataset.key;
      if(middleSort.key===key) middleSort.dir=middleSort.dir==='asc'?'desc':'asc';
      else{middleSort.key=key;middleSort.dir=key==='중학교내신'?'desc':'asc';}
      renderMiddle();
    });
  });
  const top15=sortedMS.slice(0,15);
  destroyChart('c-ms-bar');
  charts['c-ms-bar']=new Chart(document.getElementById('c-ms-bar'),{
    type:'bar',
    data:{labels:top15.map(v=>v[0]),datasets:[{data:top15.map(v=>v[1]),backgroundColor:top15.map((_,i)=>`hsl(${190+i*4},70%,${56-Math.min(i,8)*2}%)`),borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:18,right:16,left:8,bottom:8}},plugins:{legend:{display:false},valueLabelPlugin:{suffix:'명',color:'#e8edf2'}},scales:{x:{grid:{display:false},ticks:{color:chartTextColor,font:{size:10},maxRotation:35,minRotation:35}},y:{beginAtZero:true,suggestedMax:addAxisPadding(top15.map(v=>v[1]),1,1.1),grid:{color:chartGrid},ticks:{color:chartTextColor,precision:0}}}}
  });
}

    </div>
    ${content}`;
}

function clearStudentPresetFilter(){
  studentPresetFilter=null;
}
function applyStudentPresetFilter(rows){
  if(!studentPresetFilter) return rows;
  return rows.filter(r=>{
    if(studentPresetFilter.year && r.입학년도!==studentPresetFilter.year) return false;
    if(studentPresetFilter.status && r.상태!==studentPresetFilter.status) return false;
    if(studentPresetFilter.path && r.진로유형!==studentPresetFilter.path) return false;
    if(studentPresetFilter.regionType==='local-employ'){
      return r.상태==='졸업' && r.진로유형==='취업' && r.지역==='대전';
    }
    if(studentPresetFilter.regionType==='outer-employ'){
      return r.상태==='졸업' && r.진로유형==='취업' && r.지역!=='대전';
    }
    if(studentPresetFilter.pathGroup==='college'){
      return r.상태==='졸업' && ['전문대','4년제'].includes(r.진로유형);
    }
    if(studentPresetFilter.pathGroup==='local-stay'){
      return r.상태==='졸업' && ((r.진로유형==='취업' && r.지역==='대전') || (['전문대','4년제'].includes(r.진로유형) && r.지역==='대전'));
    }
    return true;
  });
}
function openStudentSearchWithPreset(preset){
  studentPresetFilter=preset||null;
  if(preset && preset.year){
    searchQ.grade=String(preset.year);
  }
  selStudentIdx=null;
  setTab('student-search');
}
function studentPresetLabel(){
  if(!studentPresetFilter) return '';
  if(studentPresetFilter.label) return studentPresetFilter.label;
  return '선택된 지표 기준 필터';
}

  const allStatuses=[...new Set(DB.map(r=>r.상태).filter(Boolean))];

  let results=DB.filter(r=>{
    const nQ=searchQ.name.trim();
    const mQ=searchQ.middle.trim();
    const dQ=searchQ.dept.trim();
    const sQ=searchQ.status.trim();
    if(nQ){
      const hit = r.이름.includes(nQ)
        || String(r.학생ID||'').includes(nQ)
        || String(r.출신중학교||'').includes(nQ)
        || String(r.대학회사명||'').includes(nQ)
        || String(r.입학학과||'').includes(nQ);

    }
    if(mQ&&!r.출신중학교.includes(mQ)) return false;
    if(dQ&&r.입학학과!==dQ) return false;
    if(sQ&&r.상태!==sQ) return false;

      <select class="stu-filter-select" id="sq-status">
        <option value="">전체 상태</option>
        ${allStatuses.map(s=>`<option value="${escapeHtml(s)}" ${searchQ.status===s?'selected':''}>${escapeHtml(s)}</option>`).join('')}
      </select>
    </div>
    <div class="stu-yr-tabs">
      ${['전체',...allYears.map(String)].map(y=>`<button class="stu-yr-tab ${searchQ.grade===y?'active':''}" data-yr="${y}">${y==='전체'?'전체':y+'학년도'}</button>`).join('')}
    </div>
    <div class="stu-main-layout">
      <div class="stu-table-card">
        <div class="stu-table-hdr">
          <span>${searchQ.grade==='전체'?'전체 학년도 학생 조회':searchQ.grade+'학년도 학생 조회'}</span>

          <table class="stu-main-tbl">
            <thead><tr>
              <th>이름</th><th>학생ID</th><th>학과</th><th>상태</th><th>진로유형</th><th>지역</th><th>사후관리대상</th><th>위험도</th>

  el.querySelectorAll('.stu-yr-tab').forEach(btn=>btn.addEventListener('click',()=>{searchQ.grade=btn.dataset.yr;selStudentIdx=null;renderStudentSearch();}));
  el.querySelectorAll('table.stu-main-tbl tr[data-ridx]').forEach(row=>{
    row.addEventListener('click',()=>{

    });
  });
  if(selR){
    bindDetailTabs(document.getElementById('stu-detail-panel'), selR);
  }
}
function bindDetailTabs(panel, r){

async function loadWorkbookFromArrayBuffer(buffer,name=''){
  const workbook=XLSX.read(buffer,{type:'array'});
  rawWorkbook=workbook;
  dbSheetName = workbook.Sheets['학생통합DB'] ? '학생통합DB' : workbook.SheetNames[0];
  const dbSheet=workbook.Sheets[dbSheetName]||workbook.Sheets[workbook.SheetNames[0]];
  const targetSheet=workbook.Sheets[workbook.SheetNames[1]]||workbook.Sheets['Sheet1'];
  if(!dbSheet){
    setFileStatus('학생통합DB 시트를 찾지 못함','warn');
    setLoadBanner('<strong>학생통합DB</strong> 시트를 찾지 못했습니다. 엑셀 구조를 확인해주세요.','warn',true);
    return;
  }
  const rawRows=XLSX.utils.sheet_to_json(dbSheet,{defval:''});
  const rawAoa=XLSX.utils.sheet_to_json(dbSheet,{header:1,defval:''});
  originalHeaders=(rawAoa[0]||[]).map(v=>String(v||'').trim());
  originalSheetRows=rawRows.map(r=>({...r}));
  DB=rawRows.map((r,i)=>normalizeRow(r,i)).filter(r=>r.이름&&r.입학년도);
  YEARS=[...new Set(DB.map(r=>r.입학년도).filter(Boolean))].sort((a,b)=>a-b);
  metricsMap=targetSheet?parseMetrics(targetSheet):{};
  summaryCache={};
  selStudentIdx=null; selGradIdx=null; gradSearch=''; gradYear='전체';
  workbookName=name||workbookName||DEFAULT_XLSX;
  setFileStatus(DB.length?`엑셀 연결 완료 · ${workbookName}`:'데이터 없음',DB.length?'ok':'warn');
  setLoadBanner(`<strong>${escapeHtml(workbookName)}</strong> 불러오기 완료 · 학생 ${fmtNum(DB.length)}명 · 데이터 학년도 ${YEARS.join(', ')} · 목표치는 2번째 시트 기준`,'ok',true);
  if(DB.length) document.getElementById('export-btn').style.display='';
  document.getElementById('save-direct-btn').style.display = canDirectWrite ? '' : 'none';
  renderAll();
}
async function tryAutoLoadDefaultFile(){
  // 구글 시트 모드에서는 사용하지 않음 — loadDataFromGAS()가 대신 처리
  // 엑셀 파일을 수동으로 올릴 경우에만 아래 로직 동작
  try{
    const res=await fetch(DEFAULT_XLSX);
    if(!res.ok) throw new Error('fetch failed');
    const buffer=await res.arrayBuffer();
    await loadWorkbookFromArrayBuffer(buffer,DEFAULT_XLSX);
  }catch(err){
    // 엑셀 없음 — 구글 시트 로드가 이미 됐으면 무시
    if(!DB.length) renderAll();
  }
}
document.getElementById('pick-file-btn').addEventListener('click',()=>document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change',async e=>{
  const file=e.target.files?.[0];
  if(!file) return;
  workbookName=file.name;
  workbookFileHandle=null;
  canDirectWrite=false;
  document.getElementById('save-direct-btn').style.display='none';
  const buffer=await file.arrayBuffer();
  await loadWorkbookFromArrayBuffer(buffer,file.name);
  e.target.value='';
});
